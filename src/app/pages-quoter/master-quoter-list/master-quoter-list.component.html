<div class="grid grid-cols-1 gap-4">
  <!-- LIST CARD -->
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm">
    <!-- Header / Toolbar -->
    <div class="p-4 sm:p-5 border-b border-gray-100">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div class="min-w-0">
          <h1 class="text-base sm:text-lg font-semibold text-gray-900">List of Quotes</h1>
          <p class="text-xs sm:text-sm text-gray-500">Search, manage and edit your quoters.</p>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center gap-3">
          <!-- Search -->
          <div class="relative w-full sm:w-80">
            <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-gray-400">
              <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
              </svg>
            </span>

            <input
              type="text"
              [(ngModel)]="filterText"
              (input)="filterQuotes()"
              placeholder="Filter quotes..."
              class="block w-full rounded-lg bg-white pl-10 pr-3 py-2 text-sm text-gray-900
                     ring-1 ring-inset ring-gray-300 placeholder:text-gray-400
                     focus:outline-none focus:ring-2 focus:ring-indigo-600"
            />
          </div>

          <!-- Action -->
          <button
            type="button"
            (click)="quoterForm()"
            class="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-semibold
                   text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800
                   shadow-sm shadow-indigo-600/10"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            Add Quoter
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="p-4 sm:p-5">
      <div class="overflow-x-auto rounded-xl border border-gray-100">
        <table class="min-w-full bg-white">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Name</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">MQ type</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Days</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600">Destinations</th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-600 w-44">Actions</th>
            </tr>
          </thead>

          <tbody class="divide-y divide-gray-100">
            @for (quoter of filteredQuotes; track $index) {
              <tr class="text-sm text-gray-700 hover:bg-gray-50/70">
                <td class="px-4 py-3 whitespace-nowrap font-medium text-gray-900">
                  {{quoter.name}}
                </td>

                <td class="px-4 py-3 whitespace-nowrap">
                  <span class="inline-flex items-center rounded-full bg-indigo-50 px-2 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-inset ring-indigo-100">
                    {{quoter.type}}
                  </span>
                </td>

                <td class="px-4 py-3 whitespace-nowrap">
                  <span class="inline-flex items-center rounded-full bg-gray-50 px-2 py-1 text-xs font-semibold text-gray-700 ring-1 ring-inset ring-gray-200">
                    {{quoter.days}}
                  </span>
                </td>

                <td class="px-4 py-3 whitespace-nowrap">
                  <span class="truncate block max-w-[320px] text-gray-700">
                    {{quoter.destinations}}
                  </span>
                </td>

                <td class="px-4 py-3 whitespace-nowrap">
                  <div class="flex items-center gap-2">
                    <button
                      type="button"
                      class="inline-flex h-9 w-9 items-center justify-center rounded-lg
                             ring-1 ring-inset ring-indigo-200 text-indigo-700 hover:bg-indigo-50"
                      (click)="editQuoter(quoter._id)"
                      aria-label="Edit"
                      title="Edit"
                    >
                      <i class="bx bx-edit-alt text-xl"></i>
                    </button>

                    <button
                      type="button"
                      class="inline-flex h-9 w-9 items-center justify-center rounded-lg
                             ring-1 ring-inset ring-red-200 text-red-600 hover:bg-red-50"
                      [swal]="{title:'Confirmation', text:'Are you sure you want to delete this record?' , showCancelButton: true}"
                      (confirm)="deleteQuoter(quoter._id)"
                      aria-label="Delete"
                      title="Delete"
                    >
                      <i class="bx bx-trash text-xl"></i>
                    </button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
