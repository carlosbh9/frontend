  class="min-h-screen bg-slate-100 transition-all duration-200"
>
  <app-header (toggleSidebar)="toggleSidebar()"></app-header>

  <div class="p-4 sm:p-6">
    <router-outlet></router-outlet>
  </div>
</main>
