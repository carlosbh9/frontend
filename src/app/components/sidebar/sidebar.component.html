<!--sidenav -->
<div [ngClass]="{'translate-x-0': isOpen, '-translate-x-full': !isOpen}" class="fixed left-0 top-0 w-64 h-full bg-brand p-4 z-50 sidebar-menu transition-transform">
  <!-- bg-[#f8f4f3] -->
    <a href="#" class="grid grid-cols-1 items-center justify-center pb-4 border-b border-b-gray-800">
        <img src="/images/image.png" class="h-10 mx-auto">
        <h2 class="font-bold text-2xl mx-auto">Quoter</h2>
    </a>
    <ul class="mt-4">
        <!-- *hasRole="['admin','ventas','TD','OPE']" -->
        <li *hasPermission="['view_tariff']" class="mb-1 group">
            <a  routerLink="tariff-v2" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bx-money-withdraw mr-3 text-lg'></i>
                <span class="text-sm">Tariff menu</span>
            </a>
        </li>
        <!-- *hasRole="['admin','ventas','TD']" -->
        <li *hasPermission="['view_quoter']" class="mb-1 group">
            <a  routerLink="quoter-main/quoter-list" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bx-task mr-3 text-lg'></i>
                <span class="text-sm">Ventas</span>
            </a>
        </li>
        <li *hasPermission="['view_quoter']" class="mb-1 group">
            <a  routerLink="quoter-main/service-orders" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bx-list-check mr-3 text-lg'></i>
                <span class="text-sm">Service Orders</span>
            </a>
        </li>
        <li *hasPermission="['view_users']" class="mb-1 group">
            <a  routerLink="quoter-main/service-order-templates" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bx-slider-alt mr-3 text-lg'></i>
                <span class="text-sm">Order Templates</span>
            </a>
        </li>
         <li class="mb-1 group">
            <a  routerLink="operations/biblia" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bx-smile mr-3 text-lg'></i>
                <span class="text-sm">Operaciones</span>
            </a>
        </li>
        <!-- <li class="mb-1 group">
            <a  routerLink="" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bx-money mr-3 text-lg'></i>
                <span class="text-sm">Tesoreria</span>
            </a>
        </li> -->
        <!-- *hasRole="['admin']" -->
          <li *hasPermission="['view_users']" class="mb-1 group">
            <a  routerLink="manageUsers" class="flex font-semibold items-center py-2 px-4 text-gray-900 hover:bg-gray-950 hover:text-gray-100 rounded-md group-[.active]:bg-gray-800 group-[.active]:text-white group-[.selected]:bg-gray-950 group-[.selected]:text-gray-100">
                <i class='bx bxs-user-detail mr-3 text-lg'></i>
                <span class="text-sm">Users</span>
            </a>
        </li>
    </ul>
</div>
<div class="fixed top-0 left-0 w-full h-full bg-black/50 z-40 md:hidden sidebar-overlay"></div>
<!-- end sidenav -->
