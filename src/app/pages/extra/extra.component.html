<div class="rounded-2xl border border-gray-100 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <div class="border-b border-gray-100 p-4 sm:p-5 dark:border-slate-800">
    <div class="flex items-center justify-between gap-4">
      <div>
        <div class="inline-flex items-center gap-2 rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 ring-1 ring-inset ring-indigo-100 dark:bg-indigo-500/10 dark:text-indigo-300 dark:ring-indigo-500/20">Tariffs Management</div>
        <h3 class="mt-3 text-base font-semibold text-gray-900 sm:text-lg dark:text-slate-100">Extras</h3>
        <p class="mt-1 text-xs text-gray-500 sm:text-sm dark:text-slate-400">Manage complementary tariffs and notes.</p>
      </div>
      <button *hasPermission="['create_tariff']" type="button" (click)="openModal()" class="inline-flex items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700">
        <i class="bx bx-plus text-lg"></i>
        Add Extra
      </button>
    </div>
  </div>
  <div class="p-4 sm:p-5">
    <app-ui-table [data]="data()" [columns]="columns" [actions]="actions" (action)="handleTableAction($event)"></app-ui-table>
  </div>
</div>

@if (showAddModal) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/70"></div>
  <div class="relative w-full max-w-2xl overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-xl dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-start justify-between gap-3 border-b border-gray-100 p-4 sm:p-5 dark:border-slate-800">
      <div><p class="text-base font-semibold text-gray-900 sm:text-lg dark:text-slate-100">Add Extra</p><p class="text-xs text-gray-500 sm:text-sm dark:text-slate-400">Create a new extra tariff.</p></div>
      <button type="button" (click)="closeModal()" class="inline-flex h-9 w-9 items-center justify-center rounded-xl ring-1 ring-inset ring-gray-200 hover:bg-gray-50 dark:ring-slate-700"><i class="bx bx-x text-xl"></i></button>
    </div>
    <div class="p-4 sm:p-5">
      <form id="add_extra_form" (submit)="onSubmit()" class="space-y-5">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <input type="text" name="name" [(ngModel)]="newExtra.name" placeholder="Name" class="rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700" />
          <select name="year" [(ngModel)]="newExtra.year" class="rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700"><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option></select>
          <input type="number" name="price" [(ngModel)]="newExtra.price" placeholder="Price" class="rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700 sm:col-span-2" />
        </div>
        <div class="rounded-2xl border border-gray-200 bg-gray-50/70 p-4 dark:border-slate-800 dark:bg-slate-800/30">
          <p class="text-sm font-semibold text-gray-900 dark:text-slate-100">Price Type</p>
          <div class="mt-3 grid gap-3 sm:grid-cols-2">
            <label class="flex items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-900"><input type="radio" name="priceperson" [(ngModel)]="newExtra.priceperson" [value]="true" class="h-4 w-4 text-indigo-600" /><span class="text-sm text-gray-700 dark:text-slate-200">Per Person</span></label>
            <label class="flex items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-900"><input type="radio" name="priceperson" [(ngModel)]="newExtra.priceperson" [value]="false" class="h-4 w-4 text-indigo-600" /><span class="text-sm text-gray-700 dark:text-slate-200">Group Price</span></label>
          </div>
        </div>
        <textarea name="notes" [(ngModel)]="newExtra.notes" rows="4" placeholder="Notes" class="block w-full rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700"></textarea>
      </form>
    </div>
    <div class="flex items-center justify-end gap-3 border-t border-gray-100 p-4 sm:p-5 dark:border-slate-800">
      <button type="button" (click)="closeModal()" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-200 hover:bg-gray-50 dark:text-slate-200 dark:ring-slate-700">Cancel</button>
      <button type="submit" form="add_extra_form" class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700">Confirm</button>
    </div>
  </div>
</div>
}

@if (showEditModal) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/70"></div>
  <div class="relative w-full max-w-2xl overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-xl dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-start justify-between gap-3 border-b border-gray-100 p-4 sm:p-5 dark:border-slate-800">
      <div><p class="text-base font-semibold text-gray-900 sm:text-lg dark:text-slate-100">Edit Extra</p><p class="text-xs text-gray-500 sm:text-sm dark:text-slate-400">Update extra tariff information.</p></div>
      <button type="button" (click)="closeEditModal()" class="inline-flex h-9 w-9 items-center justify-center rounded-xl ring-1 ring-inset ring-gray-200 hover:bg-gray-50 dark:ring-slate-700"><i class="bx bx-x text-xl"></i></button>
    </div>
    <div class="p-4 sm:p-5">
      <form id="edit_extra_form" (submit)="onEditSubmit()" class="space-y-5">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <input type="text" name="name" [(ngModel)]="selectedExtra.name" placeholder="Name" class="rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700" />
          <select name="year" [(ngModel)]="selectedExtra.year" class="rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700"><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option></select>
          <input type="number" name="price" [(ngModel)]="selectedExtra.price" placeholder="Price" class="rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700 sm:col-span-2" />
        </div>
        <div class="rounded-2xl border border-gray-200 bg-gray-50/70 p-4 dark:border-slate-800 dark:bg-slate-800/30">
          <p class="text-sm font-semibold text-gray-900 dark:text-slate-100">Price Type</p>
          <div class="mt-3 grid gap-3 sm:grid-cols-2">
            <label class="flex items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-900"><input type="radio" name="priceperson_edit" [(ngModel)]="selectedExtra.priceperson" [value]="true" class="h-4 w-4 text-indigo-600" /><span class="text-sm text-gray-700 dark:text-slate-200">Per Person</span></label>
            <label class="flex items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-900"><input type="radio" name="priceperson_edit" [(ngModel)]="selectedExtra.priceperson" [value]="false" class="h-4 w-4 text-indigo-600" /><span class="text-sm text-gray-700 dark:text-slate-200">Group Price</span></label>
          </div>
        </div>
        <textarea name="notes" [(ngModel)]="selectedExtra.notes" rows="4" placeholder="Notes" class="block w-full rounded-xl bg-white px-3 py-2.5 text-sm ring-1 ring-inset ring-gray-300 dark:bg-slate-900 dark:ring-slate-700"></textarea>
      </form>
    </div>
    <div class="flex items-center justify-end gap-3 border-t border-gray-100 p-4 sm:p-5 dark:border-slate-800">
      <button type="button" (click)="closeEditModal()" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-200 hover:bg-gray-50 dark:text-slate-200 dark:ring-slate-700">Cancel</button>
      <button type="submit" form="edit_extra_form" class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700">Confirm</button>
    </div>
  </div>
</div>
}
